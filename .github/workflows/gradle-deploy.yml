name: Gradle Deploy
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      # helps identify build failures due to expired keys
      - run: gpg --list-secret-keys --keyid-format=long
      - name: Import GPG key
        run: echo "${{ secrets.OSSRH_GPG_SECRET_KEY }}" | gpg --batch --import
      - name: Build and test
        run: ./gradlew -PprojectVersion=$(./version.sh) build
      - name: Publish to Maven Central
        if: github.event_name == 'release' && github.event.action == 'published'
        run: ./gradlew -PprojectVersion=$(./version.sh) publishAllPublicationsToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInPlaceKey: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingInPlaceKeyPassword: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
